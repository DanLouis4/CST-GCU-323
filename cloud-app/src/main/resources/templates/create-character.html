<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cloud App - Create Character</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Create Character</h1>
    <a class="btn btn-secondary" th:href="@{/characters}">Back</a>
</div>

<form th:action="@{/characters/create}" th:object="${character}" method="post" class="row g-3">

	<div class="col-md-6">
	    <label class="form-label">Name</label>
	    <input class="form-control" type="text" th:field="*{characterName}">
	    <div class="text-danger" th:if="${#fields.hasErrors('characterName')}" th:errors="*{characterName}"></div>
	</div>

	<div class="col-md-6">
	    <label class="form-label">Race</label>
	    <input class="form-control" type="text" th:field="*{characterRace}">
	    <div class="text-danger" th:if="${#fields.hasErrors('characterRace')}" th:errors="*{characterRace}"></div>
	</div>

	<div class="col-md-6">
	    <label class="form-label">Class</label>
	    <input class="form-control" type="text" th:field="*{characterClass}">
	    <div class="text-danger" th:if="${#fields.hasErrors('characterClass')}" th:errors="*{characterClass}"></div>
	</div>

	<div class="col-md-3">
	    <label class="form-label">Level</label>
	    <input class="form-control" type="number" min="1" th:field="*{characterLevel}">
	    <div class="text-danger" th:if="${#fields.hasErrors('characterLevel')}" th:errors="*{characterLevel}"></div>
	</div>

	<div class="col-md-3">
	    <label class="form-label">Type</label>
	    <select class="form-select" th:field="*{characterType}">
	        <option value="">Select...</option>
	        <option value="Player">Player</option>
	        <option value="NPC">NPC</option>
	    </select>
	    <div class="text-danger" th:if="${#fields.hasErrors('characterType')}" th:errors="*{characterType}"></div>
	</div>

	<div class="col-md-3">
	    <label class="form-label">Gender</label>
	    <select class="form-select" th:field="*{characterGender}">
	        <option value="">Select...</option>
	        <option value="Male">Male</option>
	        <option value="Female">Female</option>
	        <option value="Other">Other</option>
	    </select>
	    <div class="text-danger" th:if="${#fields.hasErrors('characterGender')}" th:errors="*{characterGender}"></div>
	</div>

    <div class="col-12">
        <button class="btn btn-primary" type="submit">Create</button>
    </div>

</form>

</body>
</html>
