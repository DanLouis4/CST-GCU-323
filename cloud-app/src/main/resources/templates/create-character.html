<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Character</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f3f3f3;
            font-family: Arial, Helvetica, sans-serif;
        }

        .page-shell {
            max-width: 1000px;
            margin: 40px auto;
            background: #fff;
            padding: 60px 70px 80px;
            min-height: 1100px;
        }

        .page-title {
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
        }

        .page-subtitle {
            max-width: 700px;
            margin: 0 auto 70px;
            text-align: center;
            font-size: 1.15rem;
            line-height: 1.35;
        }

        .form-label {
            font-size: 1.05rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-control,
        .form-select,
        textarea {
            border: 1px solid #1f1f1f;
            border-radius: 12px;
            min-height: 46px;
        }

        textarea.form-control {
            min-height: 760px;
            resize: none;
        }

        .preview-box {
            height: 380px;
            border: 1px solid #1f1f1f;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 0.5px;
            background-color: #fff;
            overflow: hidden;
        }

        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .actions {
            margin-top: 55px;
            display: flex;
            justify-content: center;
            gap: 70px;
        }

        .btn-action {
            min-width: 130px;
            border-radius: 10px;
            font-weight: 700;
            padding: 12px 24px;
        }

        .left-column .row {
            --bs-gutter-x: 1.5rem;
        }

        @media (max-width: 991.98px) {
            .page-shell {
                padding: 35px 24px 50px;
                min-height: auto;
            }

            textarea.form-control {
                min-height: 320px;
            }

            .preview-box {
                height: 260px;
            }

            .actions {
                gap: 20px;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
<div class="container-fluid py-4">
    <div class="page-shell">

        <h1 class="page-title">Create a Character</h1>
        <p class="page-subtitle">
            Enter the character details below to create a new Character profile.
        </p>

        <form th:action="@{/characters/create}" th:object="${character}" method="post">
            <div class="row g-5">
                <div class="col-lg-5 left-column">
                    <div class="mb-4">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" id="name" class="form-control" th:field="*{characterName}">
                    </div>

                    <div class="row mb-4">
                        <div class="col-7">
                            <label for="characterClass" class="form-label">Class</label>
                            <select id="characterClass" class="form-select" th:field="*{characterClass.classId}">
                                <option value="">Select Class</option>
                                <option th:each="characterClass : ${classes}"
                                        th:value="${characterClass.classId}"
                                        th:text="${characterClass.className}">
                                    Class Name
                                </option>
                            </select>
                        </div>
                        <div class="col-5">
                            <label for="level" class="form-label">Level</label>
                            <input type="number" id="level" class="form-control" min="1" th:field="*{characterLevel}">
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-6">
                            <label for="race" class="form-label">Race</label>
                            <select id="race" class="form-select" th:field="*{race.raceId}">
                                <option value="">Select Race</option>
                                <option th:each="race : ${races}"
                                        th:value="${race.raceId}"
                                        th:text="${race.raceName}">
                                    Race Name
                                </option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label for="gender" class="form-label">Gender</label>
                            <select id="gender" class="form-select" th:field="*{characterGender}">
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="imageUrl" class="form-label">Image URL</label>
                        <input type="text" id="imageUrl" class="form-control" th:field="*{imageUrl}" oninput="updatePreview(this.value)">
                    </div>

                    <div class="preview-box" id="previewBox">
                        <span id="previewText">Image Preview</span>
                        <img id="previewImage" alt="Character preview" style="display:none;">
                    </div>
                </div>

                <div class="col-lg-7">
                    <label for="description" class="form-label">Description</label>
                    <textarea id="description" class="form-control" th:field="*{characterDescription}"></textarea>
                </div>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-success btn-action">CREATE</button>
                <a th:href="@{/characters}" class="btn btn-danger btn-action">CANCEL</a>
            </div>
        </form>
    </div>
</div>

<script>
    function updatePreview(url) {
        const img = document.getElementById('previewImage');
        const text = document.getElementById('previewText');

        if (!url || url.trim() === '') {
            img.style.display = 'none';
            img.src = '';
            text.style.display = 'block';
            return;
        }

        img.src = url;
        img.style.display = 'block';
        text.style.display = 'none';

        img.onerror = function () {
            img.style.display = 'none';
            text.style.display = 'block';
            text.textContent = 'Invalid Image URL';
        };

        img.onload = function () {
            text.textContent = 'Image Preview';
        };
    }
</script>
</body>
</html>
